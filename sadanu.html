// subject buttons
let subjectDiv=document.getElementById("subjects");
for(let sub in data){
let btn=document.createElement("button");
btn.innerText=sub;
btn.onclick=()=>startQuiz(sub);
subjectDiv.appendChild(btn);
}

let current=[],i=0,score=0;

function startQuiz(sub){
current=data[sub];
i=0;score=0;

document.getElementById("main").innerHTML=`
<h2>${sub}</h2>
<h3 id="question"></h3>
<div id="answers"></div>
<p id="result"></p>
<button id="nextBtn" onclick="nextQ()">Next</button>
`;

loadQ();
}

function loadQ(){
document.getElementById("nextBtn").style.display="none";
document.getElementById("result").innerHTML="";

let q=current[i];
document.getElementById("question").innerHTML=(i+1)+". "+q.q;

let ansDiv=document.getElementById("answers");
ansDiv.innerHTML="";

q.answers.forEach((a,index)=>{
let btn=document.createElement("button");
btn.innerText=a;
btn.onclick=()=>check(index);
ansDiv.appendChild(btn);
});
}

function check(ans){
let q=current[i];
let res=document.getElementById("result");

if(ans===q.correct){
score++;
res.innerHTML="✅ හරි!<br>"+q.ex;
}else{
res.innerHTML="❌ වැරදි!<br>✔️ "+q.answers[q.correct]+"<br>"+q.ex;
}

document.getElementById("nextBtn").style.display="block";
}

function nextQ(){
i++;
if(i<current.length){
loadQ();
}else{
document.getElementById("main").innerHTML=
`<h2>🎉 අවසන්!</h2>
<h3>Score: ${score} / ${current.length}</h3>
<button onclick="location.reload()">🔄 නැවත</button>`;
}
}

</script>
